{% extends "base.html" %}

{% block title %}Add Student - Enrollment System{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-person-plus"></i> Add New Student</h1>
    <p>Enter student information and create login credentials</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('routes.add_student') }}">
            <h3 style="margin-bottom: 16px; font-size: 1rem; color: var(--gray-700);">Student Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter email address" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" name="department">
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept }}">{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="level">Academic Level</label>
                    <select id="level" name="level">
                        <option value="">Select Level</option>
                        {% for lvl in levels %}
                        <option value="{{ lvl }}">{{ lvl }} Level</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create password" required>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Save Student</button>
                <a href="{{ url_for('routes.students') }}" class="btn" style="background: var(--gray-200); color: var(--gray-700);"><i class="bi bi-arrow-left"></i> Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
